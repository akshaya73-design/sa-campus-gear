{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5 mb-5" style="max-width:500px;">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="text-center mb-4">

                Login

            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Password

                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button
                    class="btn btn-dark w-100">

                    Login

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
